<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nanny Hours — Invoice</title>
<link rel="stylesheet" href="css/style.css?v=4" />

<nav>
  <span class="brand">Nanny Hours</span>
  <a href="index.html">Log Hours</a>
  <a href="invoice.html" class="active">Invoices</a>
</nav>

<main>
  <div class="card no-print">
    <h1>Generate invoice</h1>
    <div class="row">
      <div>
        <label for="start-date">From</label>
        <input type="date" id="start-date" />
      </div>
      <div>
        <label for="end-date">To</label>
        <input type="date" id="end-date" />
      </div>
    </div>
    <button id="generate-btn">Generate</button>
    <div id="load-status" class="status"></div>
  </div>

  <div class="card" id="invoice-card" style="display: none">
    <div class="invoice-header">
      <div>
        <h2 id="employer-name"></h2>
        <div class="muted">Invoice for hours worked</div>
      </div>
      <div>
        <div class="muted">Billed to:</div>
        <strong id="nanny-name"></strong>
        <div class="muted" id="period-range"></div>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Time</th>
          <th class="num">Hours</th>
          <th>Notes</th>
        </tr>
      </thead>
      <tbody id="invoice-body"></tbody>
    </table>

    <div class="muted" style="margin-top: 1rem">
      Total hours: <strong id="total-hours"></strong> &times; $<span id="rate"></span>/hr
    </div>
    <div class="invoice-total">Total: $<span id="total-pay"></span></div>

    <div class="actions no-print">
      <button class="secondary" id="print-btn">Print / Save as PDF</button>
    </div>
  </div>
</main>

<script src="js/config.js?v=4"></script>
<script src="js/api.js?v=4"></script>
<script src="js/invoice.js?v=4"></script>
