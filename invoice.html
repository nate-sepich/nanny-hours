<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nanny Hours — Agreement</title>
<link rel="stylesheet" href="css/style.css?v=7" />

<nav>
  <span class="brand">Nanny Hours</span>
  <a href="index.html">Timesheet</a>
  <a href="details.html">Details</a>
  <a href="invoice.html" class="active">Agreement</a>
</nav>

<main>
  <div class="card no-print">
    <h1>Generate agreement</h1>
    <div class="row">
      <div>
        <label for="start-date">From</label>
        <input type="date" id="start-date" />
      </div>
      <div>
        <label for="end-date">To</label>
        <input type="date" id="end-date" />
      </div>
    </div>
    <button id="generate-btn">Generate</button>
    <div id="load-status" class="status"></div>
  </div>

  <div class="card" id="invoice-card" style="display: none">
    <div class="doc-title">Nanny Timesheet &amp; Pay Agreement</div>
    <div class="doc-period">Pay period: <strong id="period-range"></strong></div>

    <div class="parties">
      <div class="party">
        <h3>Nanny</h3>
        <div class="party-name" id="nanny-name"></div>
        <div class="muted" id="nanny-address"></div>
        <div class="muted" id="nanny-phone"></div>
        <div class="muted" id="nanny-email"></div>
      </div>
      <div class="party">
        <h3>Household</h3>
        <div class="party-name" id="employer-name"></div>
        <div class="muted" id="employer-address"></div>
        <div class="muted" id="employer-phone"></div>
        <div class="muted" id="employer-email"></div>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Time</th>
          <th class="num">Hours</th>
          <th>Notes</th>
        </tr>
      </thead>
      <tbody id="invoice-body"></tbody>
    </table>

    <div class="muted totals-line">
      Total hours: <strong id="total-hours"></strong> &times; $<span id="rate"></span>/hr
    </div>
    <div class="invoice-total">Total due: $<span id="total-pay"></span></div>

    <div class="agreement" id="agreement-text"></div>

    <div class="signatures">
      <div class="sig-block">
        <div class="sig-line"></div>
        <div class="sig-label">Nanny — <span id="sig-nanny-name"></span></div>
        <div class="sig-date">Date: __________________</div>
      </div>
      <div class="sig-block">
        <div class="sig-line"></div>
        <div class="sig-label">Household — <span id="sig-employer-name"></span></div>
        <div class="sig-date">Date: __________________</div>
      </div>
    </div>

    <div class="actions no-print">
      <button class="secondary" id="print-btn">Print / Save as PDF</button>
    </div>
  </div>
</main>

<script src="js/config.js?v=7"></script>
<script src="js/api.js?v=7"></script>
<script src="js/invoice.js?v=7"></script>
