<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nanny Hours — Timesheet</title>
<link rel="stylesheet" href="css/style.css?v=4" />

<nav>
  <span class="brand">Nanny Hours</span>
  <a href="index.html" class="active">Timesheet</a>
  <a href="invoice.html">Invoices</a>
</nav>

<main>
  <div class="week-bar">
    <button class="week-nav" id="prev-week" aria-label="Previous week">‹</button>
    <div class="week-label" id="week-label">Loading…</div>
    <button class="week-nav" id="next-week" aria-label="Next week">›</button>
    <button class="today-btn" id="this-week">This week</button>
  </div>

  <div id="grid"></div>
  <div id="load-status" class="muted"></div>
</main>

<div class="savebar">
  <div class="week-total-wrap">
    Week total <strong id="week-total">0.00</strong> hrs
  </div>
  <div class="savebar-right">
    <span id="save-status" class="status"></span>
    <button id="save-week">Save week</button>
  </div>
</div>

<script src="js/config.js?v=4"></script>
<script src="js/api.js?v=4"></script>
<script src="js/timesheet.js?v=4"></script>
